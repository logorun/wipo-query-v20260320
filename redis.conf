# Redis Configuration for WIPO Trademark Batch
# Persistence-enabled configuration

# Network
bind 127.0.0.1
port 6379
timeout 0
tcp-keepalive 300

# Persistence - RDB
# Save to disk at intervals
save 900 1
save 300 10
save 60 10000

# RDB compression and checksum
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /root/.openclaw/workspace/projects/wipo-trademark-batch/data

# Persistence - AOF
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# Memory Management
maxmemory 256mb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# Logging
loglevel notice
logfile /root/.openclaw/workspace/projects/wipo-trademark-batch/logs/redis.log

# Security
# protected-mode yes  # Comment out for local development

# Performance
slowlog-log-slower-than 10000
slowlog-max-len 128

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60
