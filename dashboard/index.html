<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIPO Trademark Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/drawer.css">
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 min-h-screen">
    <nav class="glass border-b border-white/10 px-6 py-4">
        <div class="flex items-center justify-between max-w-7xl mx-auto">
            <h1 class="text-2xl font-bold text-white">🌐 WIPO Trademark Dashboard</h1>
            <div class="flex items-center gap-4">
                <span id="api-status" class="px-3 py-1 rounded-full text-sm bg-green-500/20 text-green-400">API Online</span>
                <button onclick="refreshData()" class="px-4 py-2 bg-blue-500/20 hover:bg-blue-500/30 text-blue-400 rounded-lg transition">刷新</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="glass rounded-xl p-6">
                <h3 class="text-slate-400 text-sm">总任务数</h3>
                <p id="stat-total" class="text-3xl font-bold text-white mt-2">-</p>
            </div>
            <div class="glass rounded-xl p-6">
                <h3 class="text-slate-400 text-sm">已完成</h3>
                <p id="stat-completed" class="text-3xl font-bold text-green-400 mt-2">-</p>
            </div>
            <div class="glass rounded-xl p-6">
                <h3 class="text-slate-400 text-sm">处理中</h3>
                <p id="stat-processing" class="text-3xl font-bold text-blue-400 mt-2">-</p>
            </div>
            <div class="glass rounded-xl p-6">
                <h3 class="text-slate-400 text-sm">失败</h3>
                <p id="stat-failed" class="text-3xl font-bold text-red-400 mt-2">-</p>
            </div>
        </div>

        <!-- Trademark Statistics -->
        <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
            <div class="glass rounded-xl p-6">
                <h3 class="text-slate-400 text-sm">总商标数</h3>
                <p id="stat-tm-total" class="text-3xl font-bold text-white mt-2">-</p>
            </div>
            <div class="glass rounded-xl p-6">
                <h3 class="text-slate-400 text-sm">已处理</h3>
                <p id="stat-tm-processed" class="text-3xl font-bold text-green-400 mt-2">-</p>
            </div>
            <div class="glass rounded-xl p-6">
                <h3 class="text-slate-400 text-sm">待处理</h3>
                <p id="stat-tm-pending" class="text-3xl font-bold text-yellow-400 mt-2">-</p>
            </div>
            <div class="glass rounded-xl p-6">
                <h3 class="text-slate-400 text-sm">欧盟记录</h3>
                <p id="stat-tm-eu" class="text-3xl font-bold text-blue-400 mt-2">-</p>
            </div>
            <div class="glass rounded-xl p-6">
                <h3 class="text-slate-400 text-sm">非欧盟记录</h3>
                <p id="stat-tm-noneu" class="text-3xl font-bold text-purple-400 mt-2">-</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="glass rounded-xl p-6">
                <h3 class="text-white font-semibold mb-4">任务状态分布</h3>
                <canvas id="statusChart"></canvas>
            </div>
            <div class="glass rounded-xl p-6">
                <h3 class="text-white font-semibold mb-4">每日查询量</h3>
                <canvas id="dailyChart"></canvas>
            </div>
        </div>

        <div class="glass rounded-xl p-6">
            <div id="batch-ops-bar" class="mb-4 p-3 bg-slate-800/50 rounded-lg border border-slate-700 hidden">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <span class="text-slate-300 text-sm">已选择 <span id="selected-count" class="text-blue-400 font-semibold">0</span> 个任务</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="batchExport()" class="px-4 py-2 bg-emerald-500 hover:bg-emerald-600 text-white rounded-lg transition text-sm flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                            批量导出
                        </button>
                        <button onclick="clearSelection()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg transition text-sm">
                            取消选择
                        </button>
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-between mb-4">
                <h3 class="text-white font-semibold">最近任务</h3>
                <select id="status-filter" class="bg-slate-800 border border-slate-700 rounded px-3 py-1 text-sm text-white">
                    <option value="all">全部状态</option>
                    <option value="completed">已完成</option>
                    <option value="processing">处理中</option>
                    <option value="pending">待处理</option>
                    <option value="failed">失败</option>
                </select>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-slate-400 border-b border-slate-700">
                            <th class="pb-3 w-10"><input type="checkbox" id="select-all" onchange="toggleSelectAll()" class="w-4 h-4 rounded border-slate-600 text-blue-500 focus:ring-blue-500/50 bg-slate-700"></th>
                            <th class="pb-3">任务ID</th>
                            <th class="pb-3">商标数</th>
                            <th class="pb-3">进度</th>
                            <th class="pb-3">状态</th>
                            <th class="pb-3">创建时间</th>
                            <th class="pb-3">操作</th>
                        </tr>
                    </thead>
                    <tbody id="task-list" class="text-slate-300"></tbody>
                </table>
            </div>
        </div>

        <div class="glass rounded-xl p-6">
            <h3 class="text-white font-semibold mb-4">提交新查询</h3>
            <div class="flex gap-4">
                <input type="text" id="new-trademarks" placeholder="输入商标名称，多个用逗号分隔" class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white">
                <button onclick="submitTask()" class="px-6 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-lg transition">提交查询</button>
            </div>
        </div>

        <div class="glass rounded-xl p-6">
            <h3 class="text-white font-semibold mb-4">从 Excel 文件导入</h3>
            <div class="flex flex-col gap-4">
                <div class="flex items-center gap-4">
                    <input type="file" id="excel-file" accept=".xlsx,.xls" class="hidden" onchange="handleFileSelect(event)">
                    <button onclick="document.getElementById('excel-file').click()" class="px-6 py-2 bg-purple-500 hover:bg-purple-600 text-white rounded-lg transition flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                        选择 Excel 文件
                    </button>
                    <span id="file-name" class="text-slate-400 text-sm"></span>
                </div>
                <p class="text-slate-500 text-sm">支持 .xlsx 和 .xls 格式，AI 将自动提取商标名称</p>
            </div>
        </div>
    </main>

    <!-- Batch Export Modal -->
    <div id="export-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 p-4 hidden opacity-0 transition-opacity duration-300">
        <div class="glass rounded-2xl w-full max-w-lg transform scale-95 transition-transform duration-300" id="export-modal-content">
            <!-- Header -->
            <div class="p-6 border-b border-white/10">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-emerald-500/20 to-cyan-500/20 flex items-center justify-center border border-emerald-500/30">
                        <svg class="w-6 h-6 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                        </svg>
                    </div>
                    <div>
                        <h3 class="text-xl font-semibold text-white">批量导出</h3>
                        <p class="text-slate-400 text-sm mt-0.5">已选择 <span id="export-task-count" class="text-emerald-400 font-semibold">0</span> 个任务</p>
                    </div>
                </div>
            </div>
            
            <!-- Content -->
            <div class="p-6">
                <p class="text-slate-300 mb-6 leading-relaxed">请选择导出模式。不同的导出模式将影响 Excel 文件中包含的数据内容。</p>
                
                <div class="space-y-4">
                    <!-- Option 1: Export All -->
                    <button onclick="confirmBatchExport('all')" class="w-full group relative overflow-hidden rounded-xl border border-slate-600/50 hover:border-emerald-500/50 transition-all duration-300">
                        <div class="absolute inset-0 bg-gradient-to-r from-emerald-500/10 to-cyan-500/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        <div class="relative p-5 flex items-center gap-4">
                            <div class="w-10 h-10 rounded-lg bg-slate-800 group-hover:bg-emerald-500/20 flex items-center justify-center transition-colors border border-slate-600 group-hover:border-emerald-500/30">
                                <svg class="w-5 h-5 text-slate-400 group-hover:text-emerald-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path>
                                </svg>
                            </div>
                            <div class="flex-1 text-left">
                                <h4 class="text-white font-medium group-hover:text-emerald-300 transition-colors">全部（包含未抓取）</h4>
                                <p class="text-slate-400 text-sm mt-0.5">导出所有商标，包括还未查询到 WIPO 结果的记录</p>
                            </div>
                            <div class="w-6 h-6 rounded-full border-2 border-slate-600 group-hover:border-emerald-500 group-hover:bg-emerald-500 flex items-center justify-center transition-all">
                                <svg class="w-3 h-3 text-transparent group-hover:text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                                </svg>
                            </div>
                        </div>
                    </button>
                    
                    <!-- Option 2: Results Only -->
                    <button onclick="confirmBatchExport('results-only')" class="w-full group relative overflow-hidden rounded-xl border border-slate-600/50 hover:border-cyan-500/50 transition-all duration-300">
                        <div class="absolute inset-0 bg-gradient-to-r from-cyan-500/10 to-blue-500/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        <div class="relative p-5 flex items-center gap-4">
                            <div class="w-10 h-10 rounded-lg bg-slate-800 group-hover:bg-cyan-500/20 flex items-center justify-center transition-colors border border-slate-600 group-hover:border-cyan-500/30">
                                <svg class="w-5 h-5 text-slate-400 group-hover:text-cyan-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                </svg>
                            </div>
                            <div class="flex-1 text-left">
                                <h4 class="text-white font-medium group-hover:text-cyan-300 transition-colors">仅有结果</h4>
                                <p class="text-slate-400 text-sm mt-0.5">仅导出有 WIPO 查询结果的商标记录</p>
                            </div>
                            <div class="w-6 h-6 rounded-full border-2 border-slate-600 group-hover:border-cyan-500 group-hover:bg-cyan-500 flex items-center justify-center transition-all">
                                <svg class="w-3 h-3 text-transparent group-hover:text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                                </svg>
                            </div>
                        </div>
                    </button>
                </div>
            </div>
            
            <!-- Footer -->
            <div class="p-6 border-t border-white/10 flex justify-center">
                <button onclick="closeExportModal()" class="px-6 py-2.5 text-slate-400 hover:text-white hover:bg-slate-800/50 rounded-lg transition-all">
                    取消
                </button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/drawer.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
